<style>
    /* 영수증 생성기 화면 전용 분할 레이아웃 */
    .receipt-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
        min-height: 100vh;
        background: #f4f4f0;
    }

    .panel-left {
        padding: 32px 40px;
        border-right: 1px solid #e0e0da;
        background: #ffffff;
    }

    .panel-right {
        padding: 32px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f4f4f0;
    }

    .section-label {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #999990;
        margin-bottom: 16px;
        font-family: 'IBM Plex Mono', monospace;
    }

    .field-group { margin-bottom: 24px; }
    .field-group + .section-label { padding-top: 8px; border-top: 1px solid #e0e0da; }

    label { display: block; font-size: 11px; color: #555555; margin-bottom: 6px; font-weight: 400; }

    .panel-left input[type="text"],
    .panel-left input[type="number"],
    .panel-left input[type="datetime-local"] {
        width: 100%;
        background: #f0f0ec;
        border: 1px solid #e0e0da;
        border-radius: 6px;
        color: #111111;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        padding: 9px 12px;
        outline: none;
        transition: border-color 0.15s;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    .panel-left input:focus { border-color: #0052cc; }
    .panel-left input::placeholder { color: #999990; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-group { display: flex; gap: 10px; margin-top: 8px; }
    .btn {
        flex: 1; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 500;
        font-family: 'Pretendard', sans-serif; border: none; transition: all 0.15s;
        display: flex; align-items: center; justify-content: center; gap: 7px; letter-spacing: 0.01em; cursor: pointer;
    }
    .btn-pdf { background: #0066ff; color: #ffffff; }
    .btn-pdf:hover { background: #0052cc; }
    .btn-png { background: #f0f0ec; color: #111111; border: 1px solid #c8c8c0; }
    .btn-png:hover { background: #e0e0da; }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .preview-label { align-self: flex-start; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #999990; margin-bottom: 24px; font-family: 'IBM Plex Mono', monospace; }
    .receipt-shadow-wrap { filter: drop-shadow(0 4px 20px rgba(0,0,0,0.12)); width: 100%; max-width: 340px; }

    /* ─── RECEIPT STYLE ─── */
    #receipt { background: #fafaf8; color: #1a1a1a; width: 100%; font-family: 'Pretendard', sans-serif; padding: 32px 28px 28px; position: relative; box-sizing: border-box; }
    #receipt::before { content: ''; display: block; height: 12px; margin: -32px -28px 28px; background: radial-gradient(circle at 50% 0%, #f4f4f0 6px, transparent 6px), linear-gradient(#f4f4f0, #f4f4f0); background-size: 20px 12px, 100% 6px; background-repeat: repeat-x, no-repeat; background-position: 0 0, 0 0; }
    #receipt::after { content: ''; display: block; height: 12px; margin: 28px -28px -28px; background: radial-gradient(circle at 50% 100%, #f4f4f0 6px, transparent 6px), linear-gradient(#f4f4f0, #f4f4f0); background-size: 20px 12px, 100% 6px; background-repeat: repeat-x, no-repeat; background-position: 0 bottom, 0 bottom; }

    .receipt-header { text-align: left; margin-bottom: 20px; }
    .receipt-amount-label { font-size: 11px; color: #6b6b6b; margin-bottom: 4px; letter-spacing: 0.03em; }
    .receipt-amount { font-size: 32px; font-weight: 700; color: #0a0a0a; letter-spacing: -0.02em; line-height: 1.1; }
    .receipt-amount span { font-size: 16px; font-weight: 500; margin-left: 2px; vertical-align: bottom; line-height: 1.8; }

    .receipt-divider, .receipt-divider-solid { border: none; border-top: 1px solid #d8d8d4; margin: 16px 0; }

    .receipt-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-size: 11px; gap: 8px; }
    .receipt-row-key { color: #6b6b6b; white-space: nowrap; flex-shrink: 0; font-size: 13px; }
    .receipt-row-dots { flex: 1; border-bottom: 1px dotted #d8d8d4; margin: 0 6px; min-width: 12px; height: 1em; margin-bottom: 2px; }
    .receipt-row-val { text-align: right; font-size: 13px; font-weight: 500; color: #0a0a0a; }

    .receipt-footer { margin-top: 20px; text-align: center; font-size: 12px; line-height: 1.8; color: #6b6b6b; }
    .receipt-footer strong { font-weight: 500; color: #444; }

    @media (max-width: 960px) { .receipt-container { grid-template-columns: 1fr; } .panel-left { border-right: none; border-bottom: 1px solid #e0e0da; } .two-col { grid-template-columns: 1fr; } }
</style>

<div class="receipt-container">
    <div class="panel-left">
        <div class="section-label">결제 정보</div>
        <div class="field-group">
            <label>충전 금액 (원)</label>
            <input type="number" id="f-amount" placeholder="예) 15000" oninput="update()">
            <label>카드 번호 (뒷 4자리 또는 마스킹)</label>
            <input type="text" id="f-card-no" placeholder="예) **** **** **** 1234" oninput="update()">
            <label>카드사</label>
            <input type="text" id="f-card-type" placeholder="예) 신한카드" oninput="update()">
            <label>승인 번호</label>
            <input type="text" id="f-approve-no" placeholder="예) 12345678" oninput="update()">
        </div>

        <div class="section-label">충전 정보</div>
        <div class="field-group">
            <div class="two-col">
                <div>
                    <label>충전 시작</label>
                    <input type="datetime-local" id="f-start" step="1" oninput="update()">
                </div>
                <div>
                    <label>충전 종료</label>
                    <input type="datetime-local" id="f-end" step="1" oninput="update()">
                </div>
            </div>
            <label>결제 시간</label>
            <input type="datetime-local" id="f-paid-at" step="1" oninput="update()">
            <label>충전량 (kWh)</label>
            <input type="number" id="f-kwh" placeholder="예) 23.5" step="0.1" oninput="update()">
            <label>충전소명</label>
            <input type="text" id="f-station" placeholder="예) 강남역 공영주차장 1번" oninput="update()">
            <label>결제 금액 (원)</label>
            <input type="number" id="f-paid-amount" placeholder="예) 15000" oninput="update()">
        </div>

        <div class="btn-group">
            <button class="btn btn-pdf" onclick="downloadPDF()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="12" x2="12" y2="18"/><polyline points="9,15 12,18 15,15"/>
                </svg>
                PDF 저장
            </button>
            <button class="btn btn-png" onclick="downloadPNG()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
                </svg>
                PNG 저장
            </button>
        </div>
    </div>

    <div class="panel-right">
        <div class="preview-label">미리보기</div>
        <div class="receipt-shadow-wrap">
            <div id="receipt">
                <div class="receipt-header">
                    <div class="receipt-amount-label">충전 금액</div>
                    <div class="receipt-amount" id="r-amount">–<span>원</span></div>
                </div>
                <div style="margin-bottom: 20px;"></div>
                <div class="receipt-row"><span class="receipt-row-key">카드 번호</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-card-no">–</span></div>
                <div class="receipt-row"><span class="receipt-row-key">카드 종류</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-card-type">–</span></div>
                <div class="receipt-row"><span class="receipt-row-key">승인 번호</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-approve-no">–</span></div>
                <hr class="receipt-divider">
                <div class="receipt-row"><span class="receipt-row-key">충전 시작</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-start">–</span></div>
                <div class="receipt-row"><span class="receipt-row-key">충전 종료</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-end">–</span></div>
                <div class="receipt-row"><span class="receipt-row-key">결제 시간</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-paid-at">–</span></div>
                <div class="receipt-row"><span class="receipt-row-key">충전량</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-kwh">–</span></div>
                <div class="receipt-row"><span class="receipt-row-key">충전소</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-station">–</span></div>
                <div class="receipt-row"><span class="receipt-row-key">결제 금액</span><span class="receipt-row-dots"></span><span class="receipt-row-val" id="r-paid-amount">–</span></div>
                <hr class="receipt-divider-solid">
                <div class="receipt-footer">
                    <strong>(주)아론</strong> | 대표: 남재현 | 792-86-02829<br>
                    서울 서초구 강남대로 327, 스파크플러스 1604호<br>
                    고객센터 1660-3793
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function fmt(val, placeholder) { return val && val.trim() !== '' ? val.trim() : placeholder || '–'; }
    function fmtNum(val, suffix) { if (!val) return '–'; const n = parseFloat(val); if (isNaN(n)) return '–'; return n.toLocaleString('ko-KR') + (suffix || ''); }
    function fmtDateTime(val) { if (!val) return '–'; const d = new Date(val); if (isNaN(d)) return val; const pad = n => String(n).padStart(2, '0'); return `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
    function g(id) { return document.getElementById(id); }

    function update() {
        const amount = g('f-amount').value;
        g('r-amount').innerHTML = amount ? `${parseFloat(amount).toLocaleString('ko-KR')}<span>원</span>` : `–<span>원</span>`;
        g('r-card-no').textContent     = fmt(g('f-card-no').value);
        g('r-card-type').textContent   = fmt(g('f-card-type').value);
        g('r-approve-no').textContent  = fmt(g('f-approve-no').value);
        g('r-start').textContent       = fmtDateTime(g('f-start').value);
        g('r-end').textContent         = fmtDateTime(g('f-end').value);
        g('r-paid-at').textContent     = fmtDateTime(g('f-paid-at').value);
        g('r-kwh').textContent         = fmtNum(g('f-kwh').value, ' kWh');
        g('r-station').textContent     = fmt(g('f-station').value);
        g('r-paid-amount').textContent = fmtNum(g('f-paid-amount').value, ' 원');
    }

    async function captureReceipt() {
        const el = g('receipt');
        return await html2canvas(el, { scale: 3, useCORS: true, backgroundColor: '#fafaf8', logging: false });
    }

    async function downloadPDF() {
        if(typeof showLoading === 'function') showLoading('PDF 생성 중...');
        try {
            const canvas = await captureReceipt();
            const { jsPDF } = window.jspdf;
            const imgData = canvas.toDataURL('image/png');
            const pxToMm = 25.4 / 96;
            const w = (canvas.width / 3) * pxToMm;
            const h = (canvas.height / 3) * pxToMm;
            const pdf = new jsPDF({ unit: 'mm', format: [w, h], orientation: 'portrait' });
            pdf.addImage(imgData, 'PNG', 0, 0, w, h);
            const now = new Date();
            const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            pdf.save(`aron_receipt_${stamp}.pdf`);
        } catch(e) {
            alert('PDF 생성 중 오류가 발생했습니다.');
            console.error(e);
        }
        if(typeof hideLoading === 'function') hideLoading();
    }

    async function downloadPNG() {
        if(typeof showLoading === 'function') showLoading('이미지 생성 중...');
        try {
            const canvas = await captureReceipt();
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const now = new Date();
                const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                a.href = url;
                a.download = `aron_receipt_${stamp}.png`;
                a.click();
                URL.revokeObjectURL(url);
                if(typeof hideLoading === 'function') hideLoading();
            }, 'image/png');
        } catch(e) {
            alert('이미지 생성 중 오류가 발생했습니다.');
            console.error(e);
            if(typeof hideLoading === 'function') hideLoading();
        }
    }
</script>
