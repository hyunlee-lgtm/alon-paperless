<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALON Paperless SYSTEM</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f3f4f6; color: #000; margin: 0; padding: 0; display: flex; min-height: 100vh; }
        
        /* 좌측 고정 사이드바 */
        .sidebar { width: 260px; background-color: #0f172a; color: #fff; display: flex; flex-direction: column; border-right: 1px solid #1e293b; position: fixed; top: 0; bottom: 0; left: 0; z-index: 10; }
        .sidebar-brand { padding: 25px 20px; font-size: 18px; font-weight: bold; letter-spacing: 1px; border-bottom: 1px solid #1e293b; background-color: #090d16; }
        .sidebar-brand span { color: #38bdf8; }
        .sidebar-menu { list-style: none; padding: 15px 0; margin: 0; flex-grow: 1; }
        .sidebar-item { padding: 12px 20px; font-size: 14px; font-weight: 500; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .sidebar-item:hover { background-color: #1e293b; color: #fff; }
        .sidebar-item.active { background-color: #0284c7; color: #fff; font-weight: bold; }
        .sidebar-footer { padding: 15px 20px; font-size: 11px; color: #475569; border-top: 1px solid #1e293b; background-color: #090d16; }

        /* 우측 콘텐츠 영역 */
        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        
        /* 로딩 및 에러 메시지 스타일 */
        .status-msg { font-size: 16px; color: #64748b; font-weight: bold; margin-top: 100px; text-align: center; line-height: 1.6; }
        .error-msg { color: #ef4444; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">ALON <span>Paperless</span></div>
        <ul class="sidebar-menu">
            <li class="sidebar-item active" data-file="ev_report.html" onclick="changeMenu(this)">⚡ 전기차 충전시설 신고서</li>
        </ul>
        <div class="sidebar-footer">© 2026 ALON 서식 인프라팀</div>
    </nav>

    <main class="main-content" id="content-stage">
        <div class="status-msg">양식을 불러오는 중입니다...</div>
    </main>

    <script>
        // 비동기로 html 파일을 읽어와서 메인 화면에 꽂아주는 함수
        async function loadForm(fileName) {
            const stage = document.getElementById('content-stage');
            try {
                // 현재 창 주소 기준으로 서식 파일 가져오기
                const response = await fetch(fileName);
                if (!response.ok) throw new Error();
                
                const htmlContent = await response.text();
                stage.innerHTML = htmlContent;
                
                // 로드 완료 후 날짜 script가 작동할 수 있도록 별도 처리
                initFormScript();
            } catch (error) {
                stage.innerHTML = `
                    <div class="status-msg error-msg">
                        ⚠️ 양식 로드 실패 (${fileName})<br><br>
                        파일이 깃허브 저장소에 정확히 업로드되었는지 확인해 주세요.
                    </div>`;
            }
        }

        // 메뉴 클릭 시 활성화 표시 변경 및 양식 로딩
        function changeMenu(element) {
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            const fileName = element.getAttribute('data-file');
            loadForm(fileName);
        }

        // 로드된 서식 내부의 스크립트(날짜 등)를 동적 실행하는 함수
        function initFormScript() {
            const mTxt = document.querySelector('.m_txt');
            const dTxt = document.querySelector('.d_txt');
            if (mTxt && dTxt) {
                const t = new Date();
                mTxt.innerText = t.getMonth() + 1;
                dTxt.innerText = t.getDate();
            }
        }

        // 🌟 첫 페이지 접속 시 자동으로 첫 번째 active 메뉴(전기차)를 불러옵니다.
        window.addEventListener('DOMContentLoaded', () => {
            const firstMenu = document.querySelector('.sidebar-item.active');
            if (firstMenu) {
                loadForm(firstMenu.getAttribute('data-file'));
            }
        });
    </script>
</body>
</html>
