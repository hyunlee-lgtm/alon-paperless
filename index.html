<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALON Paperless SYSTEM</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f4f0;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --accent: #0284c7;
            --text-main: #111111;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 고정 좌측 사이드바 */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            border-right: 1px solid #1e293b;
        }
        .sidebar-brand {
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #1e293b;
            background-color: #090d16;
        }
        .sidebar-brand span { color: #38bdf8; }
        .sidebar-menu { list-style: none; padding: 15px 0; margin: 0; flex-grow: 1; }
        .sidebar-item {
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s ease;
        }
        .sidebar-item:hover { background-color: var(--sidebar-hover); color: #fff; }
        .sidebar-item.active { background-color: var(--accent); color: #fff; font-weight: 700; }
        .sidebar-footer { padding: 15px 20px; font-size: 11px; color: #475569; border-top: 1px solid #1e293b; background-color: #090d16; }

        /* 메인 콘텐츠 영역 (사이드바 너비만큼 마진 확보) */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 서식 동적 로드 공간 */
        #content-stage {
            flex-grow: 1;
            width: 100%;
            display: flex;
        }

        .status-msg { font-size: 15px; color: #64748b; font-weight: 500; margin: auto; padding: 40px; text-align: center; }
        .error-msg { color: #ef4444; }

        /* 전역 공통 로딩 오버레이 */
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: #fff; font-size: 14px; }
        .loading-overlay.show { display: flex; }
        .spinner { width: 32px; height: 32px; border: 3px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">ALON <span>Paperless</span></div>
        <ul class="sidebar-menu">
            <li class="sidebar-item active" data-file="ev_report.html" onclick="selectMenu(this)">⚡ 전기차 충전시설 신고서</li>
            <li class="sidebar-item" data-file="receipt_gen.html" onclick="selectMenu(this)">🧾 충전 영수증 생성기</li>
        </ul>
        <div class="sidebar-footer">© 2026 ALON 서식 시스템</div>
    </nav>

    <main class="main-content">
        <div id="content-stage">
            <div class="status-msg">서식을 불러오는 중입니다...</div>
        </div>
    </main>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <span id="loading-msg">처리 중...</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        // 비동기 파일 템플릿 로더
        async function loadForm(fileName) {
            const stage = document.getElementById('content-stage');
            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error();
                
                const htmlContent = await response.text();
                stage.innerHTML = htmlContent;
                
                // 삽입된 HTML 내부의 스크립트 수동 구동 처리
                const scripts = stage.getElementsByTagName('script');
                for (let script of scripts) {
                    const newScript = document.createElement('script');
                    newScript.text = script.text;
                    document.body.appendChild(newScript).parentNode.removeChild(newScript);
                }

                // 각 메뉴별 진입 초기화 실행
                if (fileName === 'receipt_gen.html' && typeof update === 'function') {
                    update();
                }
            } catch (error) {
                stage.innerHTML = `
                    <div class="status-msg error-msg">
                        ⚠️ 양식 로드 실패 (${fileName})<br><br>
                        파일 내용을 읽어오지 못했습니다. 깃허브 페이지 새로고침(Ctrl+Shift+R)을 시도해 주세요.
                    </div>`;
            }
        }

        // 메뉴 전환 이벤트 제어
        function selectMenu(element) {
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            const fileName = element.getAttribute('data-file');
            loadForm(fileName);
        }

        // 하위 폼 제어용 전역 유틸리티 함수
        function showLoading(msg) {
            document.getElementById('loading-msg').textContent = msg;
            document.getElementById('loading').classList.add('show');
        }
        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        // 초기 구동 시 active 메뉴 로드
        window.addEventListener('DOMContentLoaded', () => {
            const activeMenu = document.querySelector('.sidebar-item.active');
            if (activeMenu) {
                loadForm(activeMenu.getAttribute('data-file'));
            }
        });
    </script>
</body>
</html>
